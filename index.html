  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

  <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:8px; align-items:center; padding:11px 18px; font-size:13px; border-top:1px solid oklch(0.94 0.005 260);\">\n              <div>{{ ps.name }}<\u002Fdiv>\n              <div><span style=\"font-size:11.5px; font-weight:700; padding:4px 10px; border-radius:7px; background:{{ ps.typeBg }}; color:{{ ps.typeColor }};\">{{ ps.type }}<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ isEbayProfit }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"padding:16px 20px; border-radius:12px; background:oklch(0.94 0.03 264); border:1px solid oklch(0.87 0.05 264); margin-bottom:20px; font-size:13.5px; color:oklch(0.4 0.15 264); font-weight:600;\">\n          This shows eBay profit only, before any other business expenses. Enter per-SKU cost prices to calculate real figures.\n        <\u002Fdiv>\n        <div style=\"background:white; border:1px solid oklch(0.91 0.01 260); border-radius:14px; padding:20px;\">\n          <div style=\"font-family:'Sora',sans-serif; font-weight:700; font-size:15.5px; margin-bottom:16px;\">Waterfall: gross sales → eBay net profit<\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column;\">\n            <sc-for list=\"{{ ebayWaterfall }}\" as=\"w\" hint-placeholder-count=\"6\">\n              <div style=\"display:flex; justify-content:space-between; align-items:center; padding:12px 4px; border-top:1px solid oklch(0.94 0.005 260); font-size:14px;\">\n                <div style=\"font-weight:{{ w.bold }};\">{{ w.label }}<\u002Fdiv>\n                <div style=\"font-weight:700; color:oklch(0.4 0.02 260);\">{{ w.value }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ isOtherExp }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"background:white; border:1px solid oklch(0.91 0.01 260); border-radius:14px; padding:20px; margin-bottom:20px;\">\n          <div style=\"font-family:'Sora',sans-serif; font-weight:700; font-size:15.5px; margin-bottom:14px;\">Add an expense<\u002Fdiv>\n          <div style=\"display:flex; gap:12px; align-items:flex-end; flex-wrap:wrap;\">\n            <div style=\"display:flex; flex-direction:column; gap:5px;\">\n              <div style=\"font-size:11.5px; font-weight:700; color:oklch(0.5 0.02 260);\">Name<\u002Fdiv>\n              <input value=\"{{ newName }}\" sc-camel-on-change=\"{{ setNewName }}\" placeholder=\"e.g. Warehouse rent\" style=\"width:220px; padding:9px 12px; border-radius:8px; border:1px solid oklch(0.85 0.01 260); font-size:13px;\">\n            <\u002Fdiv>\n            <div style=\"display:flex; flex-direction:column; gap:5px;\">\n              <div style=\"font-size:11.5px; font-weight:700; color:oklch(0.5 0.02 260);\">Category<\u002Fdiv>\n              <sc-raw-select value=\"{{ newCategory }}\" sc-camel-on-change=\"{{ setNewCategory }}\" style=\"width:170px; padding:9px 12px; border-radius:8px; border:1px solid oklch(0.85 0.01 260); font-size:13px; background:white;\">\n                <sc-for list=\"{{ expenseCategories }}\" as=\"c\" hint-placeholder-count=\"7\">\n                  <option value=\"{{ c }}\">{{ c }}<\u002Foption>\n                <\u002Fsc-for>\n              <\u002Fsc-raw-select>\n            <\u002Fdiv>\n            <sc-if value=\"{{ isOtherCategory }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex; flex-direction:column; gap:5px;\">\n                <div style=\"font-size:11.5px; font-weight:700; color:oklch(0.5 0.02 260);\">Custom category<\u002Fdiv>\n                <input value=\"{{ newCustomCategory }}\" sc-camel-on-change=\"{{ setNewCustomCategory }}\" placeholder=\"Name it…\" style=\"width:160px; padding:9px 12px; border-radius:8px; border:1px solid oklch(0.85 0.01 260); font-size:13px;\">\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <div style=\"display:flex; flex-direction:column; gap:5px;\">\n              <div style=\"font-size:11.5px; font-weight:700; color:oklch(0.5 0.02 260);\">Amount (£)<\u002Fdiv>\n              <input value=\"{{ newAmount }}\" sc-camel-on-change=\"{{ setNewAmount }}\" placeholder=\"0.00\" style=\"width:110px; padding:9px 12px; border-radius:8px; border:1px solid oklch(0.85 0.01 260); font-size:13px;\">\n            <\u002Fdiv>\n            <div sc-camel-on-click=\"{{ addExpenseClick }}\" style=\"padding:10px 20px; border-radius:9px; background:oklch(0.58 0.20 264); color:white; font-size:13.5px; font-weight:700; cursor:pointer;\">Add<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:20px;\">\n          <div style=\"background:white; border:1px solid oklch(0.91 0.01 260); border-radius:14px; overflow:hidden;\">\n            <div style=\"padding:16px 18px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid oklch(0.94 0.005 260);\">\n              <div style=\"font-family:'Sora',sans-serif; font-weight:700; font-size:15px;\">All expenses<\u002Fdiv>\n              <div style=\"font-weight:800; font-family:'Sora',sans-serif;\">{{ otherExpensesTotal }}<\u002Fdiv>\n            <\u002Fdiv>\n            <sc-for list=\"{{ expensesList }}\" as=\"e\" hint-placeholder-count=\"4\">\n              <div style=\"display:flex; align-items:center; justify-content:space-between; padding:12px 18px; font-size:13.5px; border-top:1px solid oklch(0.94 0.005 260);\">\n                <div>\n                  <div style=\"font-weight:700;\">{{ e.name }}<\u002Fdiv>\n                  <div style=\"font-size:12px; color:oklch(0.5 0.02 260); margin-top:2px;\">{{ e.category }}<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"display:flex; align-items:center; gap:16px;\">\n                  <div style=\"font-weight:700;\"> ight:700; font-size:14px;\">Transaction Report (CSV)<\u002Fdiv>\n          <div style=\"font-size:12.5px; color:oklch(0.5 0.02 260);\">Upload the eBay Seller Hub Transaction Report — paid orders (excluding refunds &amp; claims) will deduct from inventory, including component breakdown for bundle SKUs.<\u002Fdiv>\n          <label style=\"margin-top:4px; padding:8px 16px; border-radius:8px; background:oklch(0.94 0.03 264); color:oklch(0.45 0.2 264); font-size:12.5px; font-weight:700; cursor:pointer;\">\n            Choose file\n            <input type=\"file\" accept=\".csv\" sc-camel-on-change=\"{{ handleTxFile }}\" style=\"display:none;\">\n          <\u002Flabel>\n          <div style=\"font-size:12px; color:oklch(0.5 0.02 260);\">{{ txFileName }}<\u002Fdiv>\n          <div sc-camel-on-click=\"{{ processCsvClick }}\" style=\"margin-top:4px; padding:9px 20px; border-radius:8px; background:oklch(0.22 0.02 260); color:white; font-size:13px; font-weight:700; cursor:pointer;\">Process &amp; update inventory<\u002Fdiv>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ hasCsvLog }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"background:white; border:1px solid oklch(0.91 0.01 260); border-radius:14px; overflow:hidden; margin-bottom:20px;\">\n            <div style=\"padding:16px 18px; border-bottom:1px solid oklch(0.94 0.005 260); display:flex; justify-content:space-between; align-items:center;\">\n              <div style=\"font-family:'Sora',sans-serif; font-weight:700; font-size:15px;\">Inventory deductions applied<\u002Fdiv>\n              <div style=\"font-size:12.5px; color:oklch(0.5 0.02 260);\">{{ csvProcessedAt }}<\u002Fdiv>\n            <\u002Fdiv>\n            <sc-for list=\"{{ csvLog }}\" as=\"row\" hint-placeholder-count=\"3\">\n              <div style=\"padding:12px 18px; border-top:1px solid oklch(0.94 0.005 260);\">\n                <div style=\"font-size:13px; font-weight:700; margin-bottom:6px;\">{{ row.sku }} <span style=\"font-weig s:1.2fr 1.4fr 0.8fr 1fr 0.7fr; gap:8px; padding:14px 18px; background:oklch(0.97 0.006 260); font-size:11.5px; font-weight:700; color:oklch(0.5 0.02 260); text-transform:uppercase; letter-spacing:0.04em;\">\n            <div>Name<\u002Fdiv><div>Email<\u002Fdiv><div>Role<\u002Fdiv><div>Last active<\u002Fdiv><div>Status<\u002Fdiv>\n          <\u002Fdiv>\n          <sc-for list=\"{{ users }}\" as=\"u\" hint-placeholder-count=\"4\">\n            <div style=\"display:grid; grid-template-columns:1.2fr 1.4fr 0.8fr 1fr 0.7fr; gap:8px; align-items:center; padding:13px 18px; font-size:13.5px; border-top:1px solid oklch(0.94 0.005 260);\">\n              <div style=\"font-weight:700;\">{{ u.name }}<\u002Fdiv>\n              <div style=\"color:oklch(0.5 0.02 260); font-size:12.5px;\">{{ u.email }}<\u002Fdiv>\n              <div><span style=\"font-size:11.5px; font-weight:700; padding:4px 10px; border-radius:7px; background:{{ u.roleBg }}; color:{{ u.roleColor }};\">{{ u.role }}<\u002Fspan><\u002Fdiv>\n              <div style=\"color:oklch(0.5 0.02 260);\">{{ u.lastActive }}<\u002Fdiv>\n              <div><span style=\"font-size:11.5px; font-weight:700; padding:4px 10px; border-radius:7px; background:{{ u.statusBg }}; color:{{ u.statusColor }};\">{{ u.status }}<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<sc-if value=\"{{ isNotAuthed }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"display:flex; align-items:center; justify-content:center; height:100vh; width:100%; background:oklch(0.97 0.006 260); font-family:'Public Sans',sans-serif;\">\n    <div style=\"width:360px; background:white; border:1px solid oklch(0.91 0.01 260); border-radius:16px; padding:32px; display:flex; flex-direction:column; gap:14px;\">\n      <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:6px;\">\n        <div style=\"width:32px; height:32px; border-radius:9px; background:oklch(0.58 0.20 264); display:flex; align-items:center; justify-content:center;\">\n          <div style=\"width:12px; height:12px; border-radius:3px; background:white;\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-family:'Sora',sans-serif; font-weight:800; font-size:19px;\">Stockline<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-size:13.5px; color:oklch(0.5 0.02 260); margin-bottom:6px;\">Sign in with the account invited in Supabase Auth.<\u002Fdiv>\n      <input value=\"{{ authEmail }}\" sc-camel-on-change=\"{{ setAuthEmail }}\" placeholder=\"Email\" style=\"padding:10px 12px; border-radius:8px; border:1px solid oklch(0.85 0.01 260); font-size:13.5px;\">\n      <input value=\"{{ authPassword }}\" sc-camel-on-change=\"{{ setAuthPassword }}\" type=\"password\" placeholder=\"Password\" style=\"padding:10px 12px; border-radius:8px; border:1px solid oklch(0.85 0.01 260); font-size:13.5px;\">\n      <sc-if value=\"{{ hasAuthError }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"font-size:12.5px; color:oklch(0.5 0.2 25);\">{{ authError }}<\u002Fdiv>\n      <\u002Fsc-if>\n      <div sc-camel-on-click=\"{{ signInClick }}\" style=\"padding:10px 16px; border-radius:8px; background:oklch(0.58 0.20 264); color:white; font-size:13.5px; font-weight:700; text-align:center; cursor:pointer;\">Sign in<\u002Fdiv>\n      <div style=\"font-size:11.5px; color:oklch(0.6 0.01 260); text-align:center;\">Not connected yet? The dashboard runs on sample data until Supabase is linked.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nconst STATUS = {\n  Received:  { bg: 'oklch(0.94 0.05 150)', color: 'oklch(0.45 0.17 150)' },\n  Shipped:   { bg: 'oklch(0.94 0.05 150)', color: 'oklch(0.45 0.17 150)' },\n  Active:    { bg: 'oklch(0.94 0.05 150)', color: 'oklch(0.45 0.17 150)' },\n  Pending:   { bg: 'oklch(0.94 0.06 80)',  color: 'oklch(0.5 0.13 80)' },\n  Processing:{ bg: 'oklch(0.94 0.06 80)',  color: 'oklch(0.5 0.13 80)' },\n  Invited:   { bg: 'oklch(0.94 0.06 80)',  color: 'oklch(0.5 0.13 80)' },\n  Partial:   { bg: 'oklch(0.94 0.03 264)', color: 'oklch(0.45 0.2 264)' },\n  Refunded:  { bg: 'oklch(0.94 0.05 25)',  color: 'oklch(0.5 0.2 25)' },\n  Inactive:  { bg: 'oklch(0.94 0.005 260)',color: 'oklch(0.5 0.02 260)' },\n  Low:       { bg: 'oklch(0.94 0.05 25)',  color: 'oklch(0.5 0.2 25)' },\n  OK:        { bg: 'oklch(0.94 0.05 150)', color: 'oklch(0.45 0.17 150)' },\n};\nconst ROLE = {\n  Admin:  { bg: 'oklch(0.94 0.03 264)', color: 'oklch(0.45 0.2 264)' },\n  Staff:  { bg: 'oklch(0.94 0.005 260)', color: 'oklch(0.4 0.02 260)' },\n  Viewer: { bg: 'oklch(0.94 0.005 260)', color: 'oklch(0.4 0.02 260)' },\n};\n\nconst EXPENSE_CATEGORIES = ['Storage', 'Office Equipment', 'Software', 'Packaging', 'Food', 'Travel', 'Other'];\n\nconst SUPABASE_URL = 'https://yjiaxvgoaoyxjaxqqgfc.supabase.co';\nconst SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlqaWF4dmdvYW95eGpheHFxZ2ZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyNDk2NjEsImV4cCI6MjA5OTgyNTY2MX0.LV6QLv9q509YyGf_qCfnAZUmrzHtP0_ohPFCC0U99BI';\nlet sbClient = null;\nfunction getSbClient() {\n  if (!sbClient && window.supabase) sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);\n  return sbClient;\n}\n\nclass Component extends DCLogic {\n  state = {\n    view: 'overview',\n    expenses: [\n      { id: 1, name: 'Storage unit rental', category: 'Storage', amount: 220 },\n      { id: 2, name: 'Inventory tracking software', category: 'Software', amount: 39 },\n      { id: 3, name: 'Poly mailers & tape (bulk)', category: 'Packaging', amount: 86 },\n      { id: 4, name: 'Fuel for warehouse runs', category: 'Travel', amount: 54 },\n    ],\n    newName: '', newCategory: 'Storage', newCustomCategory: '', newAmount: '',\n    postageOverride: false, overrideLL: '364', overrideT48: '1189',\n    llRate: '1.55', t48Rate: '2.43',\n    inventory: [\n      { sku: 'CAB-CC-1M-BLK', name: 'USB-C to USB-C Cable 1M', stock: 340, reorder: 100, cost: 0.62, price: 4.99, postage: 'Large Letter' },\n      { sku: 'CAB-CC-2M-BLK', name: 'USB-C to USB-C Cable 2M', stock: 28, reorder: 80, cost: 0.81, price: 6.49, postage: 'Large Letter' },\n      { sku: 'CAB-LT-1M-WHT', name: 'Lightning Cable 1M', stock: 512, reorder: 120, cost: 0.70, price: 5.49, postage: 'Large Letter' },\n      { sku: 'SP-IP15-2PK', name: 'Screen Protector iPhone 15', stock: 18, reorder: 60, cost: 0.35, price: 3.99, postage: 'RM48' },\n      { sku: 'SP-IP14-2PK', name: 'Screen Protector iPhone 14', stock: 210, reorder: 60, cost: 0.35, price: 3.99, postage: 'RM48' },\n      { sku: 'CR-USBC-BLK', name: 'USB-C Card Reader', stock: 96, reorder: 50, cost: 1.10, price: 7.99, postage: 'Large Letter' },\n      { sku: 'CR-LTNG-WHT', name: 'Lightning Card Reader', stock: 9, reorder: 40, cost: 1.15, price: 8.49, postage: 'Large Letter' },\n      { sku: 'OTG-USBC-01', name: 'OTG Adapter USB-C', stock: 165, reorder: 50, cost: 0.45, price: 3.49, postage: 'Large Letter' },\n      { sku: 'PLUG-PD-20W', name: 'PD Fast Charger Plug 20W', stock: 74, reorder: 60, cost: 2.10, price: 11.99, postage: 'RM48' },\n      { sku: 'PLUG-PD-30W', name: 'PD Fast Charger Plug 30W', stock: 41, reorder: 40, cost: 2.60, price: 14.99, postage: 'RM48' },\n      { sku: 'EAR-BLACK', name: 'Wireless Earbuds — Black', stock: 50, reorder: 80, cost: 3.20, price: 9.99, postage: 'RM48' },\n      { sku: 'EAR-WHITE', name: 'Wireless Earbuds — White', stock: 35, reorder: 60, cost: 3.20, price: 9.99, postage: 'RM48' },\n      { sku: 'EAR-BEIGE', name: 'Wireless Earbuds — Beige', stock: 20, reorder: 60, cost: 3.20, price: 9.99, postage: 'RM48' },\n      { sku: 'PD Plug +1M C to C Cable_16z', name: 'PD Plug + 1M C-to-C Cable (bundle)', stock: null, reorder: 0, cost: 0, price: 6.99, postage: 'RM48',\n        components: [{ sku: 'PLUG-PD-20W', qty: 1 }, { sku: 'CAB-CC-1M-BLK', qty: 1 }] },\n      { sku: 'TB-HEAD-WHITE', name: 'Toothbrush Head — White (loose pcs)', stock: 500, reorder: 100, cost: 0.15, price: 0, postage: 'RM48' },\n      { sku: '1 Pack White', name: 'Toothbrush Heads — 1 Pack White', stock: null, reorder: 0, cost: 0, price: 3.99, postage: 'RM48',\n        components: [{ sku: 'TB-HEAD-WHITE', qty: 1 }] },\n      { sku: '2 Pack White', name: 'Toothbrush Heads — 2 Pack White', stock: null, reorder: 0, cost: 0, price: 5.99, postage: 'RM48',\n        components: [{ sku: 'TB-HEAD-WHITE', qty: 2 }] },\n      { sku: '5 Pack White', name: 'Toothbrush Heads — 5 Pack White', stock: null, reorder: 0, cost: 0, price: 9.66, postage: 'RM48',\n        components: [{ sku: 'TB-HEAD-WHITE', qty: 5 }] },\n    ],\n    poSupplier: '', poLines: [{ sku: '', qty: '' }],\n    txFileName: '', txFileText: '', csvLog: null, csvProcessedAt: '',\n    session: null, authEmail: '', authPassword: '', authError: '',\n    purchaseOrders: [\n      { id: 'PO-1042', supplier: 'Shenzhen ChargeTech Co.', ordered: '02 May', expected: '18 May', items: 800, total: '£612.00', status: 'Received' },\n      { id: 'PO-1043', supplier: 'Guangzhou Mobile Parts', ordered: '06 May', expected: '22 May', items: 500, total: '£340.00', status: 'Received' },\n      { id: 'PO-1044', supplier: 'Shenzhen ChargeTech Co.', ordered: '14 May', expected: '30 May', items: 1200, total: '£880.00', status: 'Partial' },\n      { id: 'PO-1045', supplier: 'PrimeCase Accessories', ordered: '19 May', expected: '04 Jun', items: 600, total: '£210.00', status: 'Pending' },\n      { id: 'PO-1046', supplier: 'Guangzhou Mobile Parts', ordered: '24 May', expected: '09 Jun', items: 400, total: '£296.00', status: 'Pending' },\n      { id: 'PO-1047', supplier: 'FastCharge Direct', ordered: '28 May', expected: '13 Jun', items: 300, total: '£516.00', status: 'Pending' },\n    ],\n  };\n\n  componentDidMount() {\n    const tryInit = () => {\n      const client = getSbClient();\n      if (!client) { setTimeout(tryInit, 200); return; }\n      this.sb = client;\n      client.auth.getSession().then(({ data }) => {\n        this.setState({ session: data.session });\n        if (data.session) this.loadAllData();\n      });\n      client.auth.onAuthStateChange((_event, session) => {\n        this.setState({ session });\n        if (session) this.loadAllData();\n      });\n    };\n    tryInit();\n  }\n\n  signIn() {\n    if (!this.sb) return;\n    this.setState({ authError: '' });\n    this.sb.auth.signInWithPassword({ email: this.state.authEmail, password: this.state.authPassword })\n      .then(({ error }) => { if (error) this.setState({ authError: error.message }); });\n  }\n  signOut() { if (this.sb) this.sb.auth.signOut(); }\n\n  async loadAllData() {\n    if (!this.sb) return;\n    try {\n      const [{ data: inv }, { data: comps }, { data: pos }, { data: exp }, { data: sups }] = await Promise.all([\n        this.sb.from('inventory').select('*'),\n        this.sb.from('inventory_bundle_components').select('*'),\n        this.sb.from('purchase_orders').select('*, suppliers(name), purchase_order_lines(*)').order('created_at', { ascending: false }),\n        this.sb.from('other_expenses').select('*').order('created_at', { ascending: false }),\n        this.sb.from('suppliers').select('*'),\n      ]);\n      if (inv) {\n        const inventory = inv.map(row => ({\n          sku: row.sku, name: row.name, stock: row.stock, reorder: row.reorder_level,\n          cost: row.cost, price: row.price, postage: row.postage_type,\n          components: (comps || []).filter(c => c.bundle_sku === row.sku).map(c => ({ sku: c.component_sku, qty: c.qty_per_unit })),\n        }));\n        this.setState({ inventory });\n      }\n      if (pos) {\n        const purchaseOrders = pos.map(p => {\n          const items = (p.purchase_order_lines || []).reduce((s, l) => s + l.qty, 0);\n          return {\n            id: p.po_number, supplier: p.suppliers ? p.suppliers.name : '—',\n            ordered: p.order_date, expected: p.expected_date || '—', items, total: items + ' units', status: p.status,\n          };\n        });\n        this.setState({ purchaseOrders });\n      }\n      if (exp) this.setState({ expenses: exp.map(e => ({ id: e.id, name: e.name, category: e.category, amount: e.amount })) });\n      if (sups) this.setState({ suppliersDb: sups });\n    } catch (err) { console.error('Supabase load failed', err); }\n  }\n\n  setView(v) { this.setState({ view: v }); }\n\n  addPOLine() { this.setState(s => ({ poLines: [...s.poLines, { sku: '', qty: '' }] })); }\n  removePOLine(idx) { this.setState(s => ({ poLines: s.poLines.filter((_, i) => i !== idx) })); }\n  setPOLine(idx, field, value) {\n    this.setState(s => ({ poLines: s.poLines.map((l, i) => i === idx ? { ...l, [field]: value } : l) }));\n  }\n  submitPO() {\n    const { poSupplier, poLines } = this.state;\n    const validLines = poLines.filter(l => l.sku.trim() && parseInt(l.qty) > 0);\n    if (!poSupplier.trim() || validLines.length === 0) return;\n\n    // Local optimistic update (works even without Supabase connected)\n    this.setState(s => {\n      let inventory = [...s.inventory];\n      validLines.forEach(l => {\n        const qty = parseInt(l.qty);\n        const idx = inventory.findIndex(i => i.sku.toLowerCase() === l.sku.trim().toLowerCase());\n        if (idx >= 0) inventory[idx] = { ...inventory[idx], stock: (inventory[idx].stock || 0) + qty };\n        else inventory.push({ sku: l.sku.trim(), name: l.sku.trim(), stock: qty, reorder: Math.round(qty * 0.2), cost: 0, price: 0, postage: 'RM48' });\n      });\n      const totalUnits = validLines.reduce((sum, l) => sum + parseInt(l.qty), 0);\n      const newPO = {\n        id: 'PO-' + (2000 + s.purchaseOrders.length + 1), supplier: poSupplier.trim(),\n        ordered: 'Today', expected: '—', items: totalUnits, total: totalUnits + ' units', status: 'Received',\n      };\n      return { inventory, purchaseOrders: [newPO, ...s.purchaseOrders], poSupplier: '', poLines: [{ sku: '', qty: '' }] };\n    });\n\n    if (!this.sb || !this.state.session) return;\n    (async () => {\n      try {\n        let { data: sup } = await this.sb.from('suppliers').select('id').ilike('name', poSupplier.trim()).maybeSingle();\n        let supplierId = sup && sup.id;\n        if (!supplierId) {\n          const { data: created } = await this.sb.from('suppliers').insert({ name: poSupplier.trim() }).select('id').single();\n          supplierId = created && created.id;\n        }\n        const poNumber = 'PO-' + Date.now();\n        const { data: po } = await this.sb.from('purchase_orders').insert({ po_number: poNumber, supplier_id: supplierId, status: 'Received' }).select('id').single();\n        if (po) {\n          await this.sb.from('purchase_order_lines').insert(validLines.map(l => ({ purchase_order_id: po.id, sku: l.sku.trim(), qty: parseInt(l.qty) })));\n        }\n        for (const l of validLines) {\n          const qty = parseInt(l.qty);\n          const { data: row } = await this.sb.from('inventory').select('stock').eq('sku', l.sku.trim()).maybeSingle();\n          if (row) await this.sb.from('inventory').update({ stock: (row.stock || 0) + qty }).eq('sku', l.sku.trim());\n          else await this.sb.from('inventory').insert({ sku: l.sku.trim(), name: l.sku.trim(), stock: qty, reorder_level: Math.round(qty * 0.2) });\n        }\n        this.loadAllData();\n      } catch (err) { console.error('Supabase PO write failed', err); }\n    })();\n  }\n\n  handleTxFile(e) {\n    const file = e.target.files && e.target.files[0];\n    if (!file) return;\n    const reader = new FileReader();\n    reader.onload = () => this.setState({ txFileText: reader.result, txFileName: file.name });\n    reader.readAsText(file);\n  }\n\n  processCsv() {\n    const raw = this.state.txFileText;\n    if (!raw) return;\n    const lines = raw.split('\\n');\n    let headerIdx = -1;\n    for (let i = 0; i < Math.min(20, lines.length); i++) {\n      if
